@if (!isLoading()) {
  @let model = this.model();
  <div class="app-match-page app-col max-w-sm mx-auto">
    <app-match-header-card [match]="model.match" [playerMatchStats]="model.playerMatchStats" />
    @if (model.match?.status !== Status.PENDING) {
      @for (team of model.teams; track team.id) {
        <app-team-player-match-stats [team]="team" [stats]="model.playerMatchStats ?? []" />
      }
    }
  </div>
}
