@if (model().matchWeek; as matchWeek) {
  <app-season-picker [seasonId]="matchWeek.season.id" (season)="onSeasonSelected($event)" />

  @if (model().scrollItems.length > 0) {
    <div class="flex items-center">
      <button
        (click)="active.set(!active())"
        [ngClass]="active() ? 'bg-primary text-primary-contrast' : ''"
        class="px-2 py-1 rounded-sm text-xs font-semibold border-none cursor-pointer outline-none min-w-12 h-9.5"
        type="button"
      >
        Live
      </button>

      <app-scroll-picker
        class="flex-1 min-w-0"
        [items]="model().scrollItems"
        [selectedId]="model().selectedId!"
        (selected)="onMatchWeekSelected($event)"
      />

      <button
        class="px-2 py-1 rounded-sm text-xs font-semibold border-none cursor-pointer outline-none min-w-12 h-9.5"
        type="button"
        (click)="onMoreClick()"
      >
        <app-icon icon="more_vertical" />
      </button>
    </div>
  }

  <app-match-week-picker-drawer
    [matchWeeks]="model().matchWeeks"
    [selectedId]="model().selectedId!"
    [currentId]="model().currentMatchWeekId!"
    (matchWeekSelected)="onMatchWeekSelected($event)"
  />

  <div class="app-col max-w-sm mx-auto w-full pb-4">
    <app-match-week-matches-card [matchWeekId]="matchWeekId()" />
  </div>
}
