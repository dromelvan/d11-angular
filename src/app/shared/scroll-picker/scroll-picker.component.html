<span class="shrink-0 w-[calc(50%-2.25rem)]"></span>
@for (item of items(); track item.id) {
  <button
    type="button"
    [attr.data-id]="item.id"
    class="app-col gap-0 shrink-0 min-w-12 px-2 py-1 rounded-sm items-center h-9.5"
    [class]="{
      'bg-surface-300': item.id === selectedId(),
    }"
    (click)="selected.emit(item.id)"
  >
    <span class="text-xs font-semibold text-uppercase">{{ item.label }}</span>
    <span class="text-[0.6rem] tabular-nums">{{ item.sublabel }}</span>
  </button>
}
<span class="shrink-0 w-[calc(50%-2.25rem)]"></span>
