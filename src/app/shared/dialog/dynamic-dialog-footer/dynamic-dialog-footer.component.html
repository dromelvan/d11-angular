<div class="app-row text-sm justify-between w-full">
  @if (action(); as a) {
    <a class="app-row gap-1" (click)="onAction()">
      @if (a.icon) {
        <app-icon [icon]="a.icon" [size]="22" />
      }
      <span>
        {{ a.label }}
      </span>
    </a>
  } @else {
    <span>&nbsp;</span>
  }
  <a (click)="close()">Done</a>
</div>
