<div class="app-row gap-0 pb-2">
  <app-material-icon-button
    icon="chevron_left"
    severity="secondary"
    [disabled]="!hasPrevious()"
    (click)="onPrevious()"
  />

  <div class="text-2xl font-bold text-center flex-1">{{ selectedSeason()?.name }}</div>

  <app-material-icon-button
    icon="chevron_right"
    severity="secondary"
    [disabled]="!hasNext()"
    (click)="onNext()"
  />
</div>
