<p-card [header]="seasonWinners().season.name">
  <div class="app-col gap-5">
    @let d11TeamSeasonStat = seasonWinners().d11TeamSeasonStat;
    <div class="app-col gap-2">
      <div class="text-xs font-semibold uppercase tracking-wide text-surface-500">
        D11 {{ winnerLabel() }}
      </div>
      <button
        class="grid grid-cols-[auto_1fr] gap-x-3 text-left w-full cursor-pointer"
        data-testid="d11-team"
        (click)="navigateToD11Team()"
      >
        <app-d11-team-img
          class="row-span-2 self-center"
          [d11Team]="d11TeamSeasonStat.d11Team"
          width="40"
        />
        <div class="self-end pb-0.5 flex items-baseline gap-2">
          <span class="font-medium text-md">{{ d11TeamSeasonStat.d11Team.name }}</span>
          @if (isFinished()) {
            <span class="text-xs text-surface-500" data-testid="d11-team-win-count">
              {{ d11TeamSeasonStat.winCount | ordinal }} win
            </span>
          }
        </div>
        <div class="grid grid-cols-5 gap-x-6 text-sm self-start pt-1">
          <div class="text-xs text-surface-500 text-center">W</div>
          <div class="text-xs text-surface-500 text-center">D</div>
          <div class="text-xs text-surface-500 text-center">L</div>
          <div class="text-xs text-surface-500 text-center">GD</div>
          <div class="text-xs text-surface-500 text-right">Pts</div>
          <div class="text-center">{{ d11TeamSeasonStat.matchesWon }}</div>
          <div class="text-center">{{ d11TeamSeasonStat.matchesDrawn }}</div>
          <div class="text-center">{{ d11TeamSeasonStat.matchesLost }}</div>
          <div class="text-center">
            {{ d11TeamSeasonStat.goalDifference > 0 ? '+' : ''
            }}{{ d11TeamSeasonStat.goalDifference }}
          </div>
          <div class="font-semibold text-right" data-testid="d11-team-points">
            {{ d11TeamSeasonStat.points }}
          </div>
        </div>
      </button>
    </div>

    <hr class="border-surface-200" />

    @let teamSeasonStat = seasonWinners().teamSeasonStat;
    <div class="app-col gap-2">
      <div class="text-xs font-semibold uppercase tracking-wide text-surface-500">
        Premier League {{ winnerLabel() }}
      </div>
      <button
        class="grid grid-cols-[auto_1fr] gap-x-3 text-left w-full cursor-pointer"
        data-testid="team"
        (click)="navigateToTeam()"
      >
        <app-team-img class="row-span-2 self-center" [team]="teamSeasonStat.team" width="40" />
        <div class="self-end pb-0.5 flex items-baseline gap-2">
          <span class="font-medium text-md">{{ teamSeasonStat.team.name }}</span>
          @if (isFinished()) {
            <span class="text-xs text-surface-500" data-testid="team-win-count">
              {{ teamSeasonStat.winCount | ordinal }} win
            </span>
          }
        </div>
        <div class="grid grid-cols-5 gap-x-6 text-sm self-start pt-1">
          <div class="text-xs text-surface-500 text-center">W</div>
          <div class="text-xs text-surface-500 text-center">D</div>
          <div class="text-xs text-surface-500 text-center">L</div>
          <div class="text-xs text-surface-500 text-center">GD</div>
          <div class="text-xs text-surface-500 text-right">Pts</div>
          <div class="text-center">{{ teamSeasonStat.matchesWon }}</div>
          <div class="text-center">{{ teamSeasonStat.matchesDrawn }}</div>
          <div class="text-center">{{ teamSeasonStat.matchesLost }}</div>
          <div class="text-center">
            {{ teamSeasonStat.goalDifference > 0 ? '+' : '' }}{{ teamSeasonStat.goalDifference }}
          </div>
          <div class="font-semibold text-right" data-testid="team-points">
            {{ teamSeasonStat.points }}
          </div>
        </div>
      </button>
    </div>

    <hr class="border-surface-200" />

    @let playerSeasonStat = seasonWinners().playerSeasonStat;
    <div class="app-col gap-2">
      <div class="text-xs font-semibold uppercase tracking-wide text-surface-500">
        Most valuable player
      </div>
      <button
        class="grid grid-cols-[auto_1fr] gap-x-3 text-left w-full cursor-pointer"
        data-testid="player"
        (click)="navigateToPlayer()"
      >
        <app-player-img
          class="row-span-2 self-center"
          [player]="playerSeasonStat.player"
          width="40"
        />
        <div class="self-end pb-0.5">
          <div class="flex items-baseline gap-2">
            <span class="font-medium text-md">{{ playerSeasonStat.player.name }}</span>
            @if (isFinished()) {
              <span class="text-xs text-surface-500" data-testid="player-win-count">
                {{ playerSeasonStat.winCount | ordinal }} win
              </span>
            }
          </div>
          <div class="text-xs text-surface-500">
            {{ playerSeasonStat.d11Team.shortName }}
          </div>
        </div>
        <div class="grid grid-cols-5 gap-x-2 text-sm self-start pt-1">
          <div class="text-xs text-surface-500 text-center">Goals</div>
          <div class="text-xs text-surface-500 text-center">Assists</div>
          <div class="text-xs text-surface-500 text-center">MoM</div>
          <div class="text-xs text-surface-500 text-right">Rating</div>
          <div class="text-xs text-surface-500 text-right">Pts</div>
          <div class="text-center">{{ playerSeasonStat.goals }}</div>
          <div class="text-center">{{ playerSeasonStat.goalAssists }}</div>
          <div class="text-center">{{ playerSeasonStat.manOfTheMatch }}</div>
          <div class="text-right">{{ playerSeasonStat.rating | rating }}</div>
          <div class="font-semibold text-right" data-testid="player-points">
            {{ playerSeasonStat.points }}
          </div>
        </div>
      </button>
    </div>
  </div>
</p-card>
