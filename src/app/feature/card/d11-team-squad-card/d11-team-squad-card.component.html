<p-card>
  <ng-template #header>
    <div class="app-row gap-2 text-2xl px-4 pt-4 pb-2 font-semibold">
      <app-d11-team-img [d11Team]="d11TeamSeasonStat().d11Team" width="32" />
      <span>{{ d11TeamSeasonStat().d11Team.name }}</span>
    </div>
  </ng-template>

  <app-d11-team-squad [d11TeamSeasonStat]="d11TeamSeasonStat()" [positions]="positions()" />
</p-card>
