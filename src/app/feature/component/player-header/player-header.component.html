<app-material-icon-button
  icon="more_vertical"
  variant="text"
  class="absolute! top-2 right-2 z-2`"
  iconClass="text-primary-contrast"
/>

<div class="app-row-md">
  <app-player-img [player]="player()" [width]="ImgWidth.XXLARGE" />

  <div class="app-col-sm">
    @if (player().firstName) {
      <h1 class="text-2xl">{{ player().firstName }}</h1>
    }

    <h1 class="text-3xl font-bold">{{ player().lastName }}</h1>

    @if (playerSeasonStat(); as pss) {
      <div class="position text-sm py-1">
        <span>{{ pss.position.name }}</span>
      </div>

      @if (!pss.team.dummy) {
        <app-team-base [team]="pss.team" />
      }

      @if (!pss.d11Team.dummy) {
        <app-d11-team-base [d11Team]="pss.d11Team" />
      }
    }
  </div>
</div>
