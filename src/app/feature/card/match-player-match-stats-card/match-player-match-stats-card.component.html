<p-card class="app-match-player-match-stats-card mb-4 sm:mb-0" header="Player stats">
  <div class="app-col">
    @for (squad of teamSquads(); track squad.team.id) {
      <app-team-player-match-stats
        [team]="squad.team"
        [stats]="squad.stats"
        [substituteIndex]="squad.substituteIndex"
        (statClick)="openDialog($event)"
      />
    }
  </div>
</p-card>
