@if (!isLoading()) {
  @let model = this.model();
  <div class="app-d11-match-page app-col max-w-sm mx-auto pb-4">
    <app-d11-match-header-card [match]="model.d11Match" />
    @if (model.d11Match?.status !== Status.PENDING) {
      @for (d11Team of model.d11Teams; track d11Team.id) {
        <app-d11-team-player-match-stats
          [d11Team]="d11Team"
          [stats]="model.playerMatchStats ?? []"
        />
      }
    }
  </div>
}
