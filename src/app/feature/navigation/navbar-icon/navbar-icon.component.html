<nav
  class="app-navbar-icon app-row bg-primary text-primary-contrast lg:hidden gap-4 justify-around p-4"
>
  @for (item of links; track item) {
    <a class="app-col text-primary-contrast items-center gap-1 text-xs" (click)="navigate(item)">
      <i [class]="item.icon" class="text-xl"></i>
      <span>{{ item.label }}</span>
    </a>
  }
</nav>
