<header class="app-header app-bg-header p-2 bg-primary">
  <div class="app-container mx-auto flex lg:flex-1 lg:max-w-7xl items-center justify-between">
    <div class="flex flex-1">
      @if (routerService.hasStack()) {
        <a class="max-h-10 text-white" (click)="routerService.navigateToPrevious()">
          <app-icon icon="chevron_left" />
        </a>
      } @else {
        <a href="#">
          <app-d11-lion-light-img [size]="42" />
        </a>
      }
    </div>

    <app-router-section class="lg:hidden" />

    <app-navbar-link class="hidden lg:block" />
    <app-utility-bar class="flex-1" />
  </div>
</header>
