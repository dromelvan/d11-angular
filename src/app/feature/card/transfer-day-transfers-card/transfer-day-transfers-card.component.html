<p-card class="app-transfer-day-transfers-card">
  <ng-template #header>
    <div class="app-row gap-0 px-4 pt-4 items-end font-semibold">
      <div class="text-2xl flex-1">Transfer Day {{ transferDay().transferDayNumber }}</div>
      <div class="text-sm">
        {{ transferDay().datetime | date: 'mediumDate' }}
      </div>
    </div>
  </ng-template>
  <app-transfer-day-transfers [transferDay]="transferDay()" [draft]="draft()" />
</p-card>
