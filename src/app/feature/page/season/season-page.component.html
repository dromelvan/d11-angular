<div class="app-season-page app-col max-w-3xl mx-auto pb-4">
  <app-season-picker [seasonId]="seasonId()" (season)="onSeasonSelected($event)" />
  @if (model().teamSeasonStats.length > 0) {
    <app-team-season-stats-card [teamSeasonStats]="model().teamSeasonStats" />
  }
  @if (model().d11TeamSeasonStats.length > 0) {
    <app-d11-team-season-stats-card [d11TeamSeasonStats]="model().d11TeamSeasonStats" />
  }
</div>
